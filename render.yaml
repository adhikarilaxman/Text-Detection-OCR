services:
  - type: web
    name: ocr-backend
    env: python
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr
      pip install -r backend/requirements.txt
      cd frontend && npm install && npm run build && cd ..
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
