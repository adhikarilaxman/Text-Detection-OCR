services:
  - type: web
    name: text-detection-ocr
    env: python
    rootDir: backend
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr libgl1
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
