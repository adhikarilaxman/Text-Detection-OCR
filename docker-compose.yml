version: "3.9"

services:
  ocr-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist uploaded files across container restarts
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  uploads_data:
